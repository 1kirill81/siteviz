<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея | Домио София</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Домио София</a>
            <nav class="nav">
                <a href="index.html#services">Услуги</a>
                <a href="index.html#about">Обо мне</a>
                <a href="gallery.html" class="active">Галерея</a>
                <a href="index.html#contacts">Контакты</a>
            </nav>
        </div>
    </header>

    <main class="pt-100">
        <section class="section">
            <div class="container">
                <h1 class="section-title">Портфолио</h1>
                <p class="subtitle-center">Примеры работ и используемые материалы</p>
                <div id="gallery-container" class="gallery-grid">
                    </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="contact-info">
                <h3>Связаться со мной</h3>
                <a href="mailto:hello@example.com" class="neon-link">hello@example.com</a>
            </div>
            <div class="socials">
                <a href="#" class="neon-link">Telegram</a>
            </div>
        </div>
    </footer>

    <!-- Color Switcher (Expanding Menu) -->
    <div class="color-switcher-container">
        <button class="color-switcher-toggle" title="Сменить оформление">🎨</button>
        <div class="color-options-wrapper">
            <!-- Neon Colors -->
            <div class="switcher-section">
                <div class="switcher-label">Цвет неона</div>
                <div class="options-row">
                    <div class="color-option active" data-type="neon" data-color="#ffffff" data-rgb="255, 255, 255" style="background: #ffffff; color: #ffffff;"></div>
                    <div class="color-option" data-type="neon" data-color="#00f3ff" data-rgb="0, 243, 255" style="background: #00f3ff; color: #00f3ff;"></div>
                    <div class="color-option" data-type="neon" data-color="#ff00ff" data-rgb="255, 0, 255" style="background: #ff00ff; color: #ff00ff;"></div>
                    <div class="color-option" data-type="neon" data-color="#00ff00" data-rgb="0, 255, 0" style="background: #00ff00; color: #00ff00;"></div>
                    <div class="color-option" data-type="neon" data-color="#ffcc00" data-rgb="255, 204, 0" style="background: #ffcc00; color: #ffcc00;"></div>
                    <div class="color-option" data-type="neon" data-color="#ff3e3e" data-rgb="255, 62, 62" style="background: #ff3e3e; color: #ff3e3e;"></div>
                    <div class="color-option" data-type="neon" data-color="#ae00ff" data-rgb="174, 0, 255" style="background: #ae00ff; color: #ae00ff;"></div>
                    <div class="color-option" data-type="neon" data-color="#0062ff" data-rgb="0, 98, 255" style="background: #0062ff; color: #0062ff;"></div>
                </div>
            </div>
            <!-- Text Colors -->
            <div class="switcher-section">
                <div class="switcher-label">Цвет текста</div>
                <div class="options-row">
                    <div class="color-option active" data-type="text" data-color="#ffffff" style="background: #ffffff; color: #ffffff;"></div>
                    <div class="color-option" data-type="text" data-color="#00f3ff" style="background: #00f3ff; color: #00f3ff;"></div>
                    <div class="color-option" data-type="text" data-color="#ff00ff" style="background: #ff00ff; color: #ff00ff;"></div>
                    <div class="color-option" data-type="text" data-color="#00ff00" style="background: #00ff00; color: #00ff00;"></div>
                    <div class="color-option" data-type="text" data-color="#ffcc00" style="background: #ffcc00; color: #ffcc00;"></div>
                    <div class="color-option" data-type="text" data-color="#ff3e3e" style="background: #ff3e3e; color: #ff3e3e;"></div>
                    <div class="color-option" data-type="text" data-color="#ae00ff" style="background: #ae00ff; color: #ae00ff;"></div>
                    <div class="color-option" data-type="text" data-color="#0062ff" style="background: #0062ff; color: #0062ff;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
    <script src="app.js?v=3"></script>
</body>
</html>
</html>
